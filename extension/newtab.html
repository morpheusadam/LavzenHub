<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lavzen Hub</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/icon128.png">
  <style>
    :root {
      --bg: #07070a;
      --panel: #0f0f17;
      --border: #ffffff1a;
      --text: #f4f5f8;
      --muted: #a6a8b4;
      --brand: #a3e635;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; }
    iframe { border: 0; width: 100vw; height: 100vh; display: block; }

    /* Loading veil shown until the hub iframe finishes loading */
    .veil {
      position: fixed; inset: 0; display: grid; place-items: center;
      background:
        radial-gradient(60% 60% at 50% 40%, #a3e63514, transparent 70%),
        radial-gradient(50% 50% at 80% 80%, #c084fc14, transparent 70%),
        var(--bg);
      transition: opacity .35s ease; z-index: 2;
    }
    .veil.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid #ffffff1f; border-top-color: var(--brand);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state when no hub URL is configured */
    .setup {
      color: var(--muted); font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      display: grid; place-items: center; height: 100vh; text-align: center; padding: 24px;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
      padding: 32px 28px; max-width: 380px; width: 100%;
      box-shadow: 0 24px 60px #00000066;
    }
    .logo { width: 64px; height: 64px; margin: 0 auto 18px; display: block; }
    .card h2 { color: var(--text); margin: 0 0 8px; font-size: 20px; }
    .card p { margin: 0 0 20px; font-size: 14px; line-height: 1.55; }
    .btn {
      display: inline-block; padding: 11px 20px; border-radius: 10px;
      background: var(--brand); color: #07070a; font-weight: 700; font-size: 14px;
      text-decoration: none; cursor: pointer;
    }
    .btn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="newtab.js"></script>
</body>
</html>
